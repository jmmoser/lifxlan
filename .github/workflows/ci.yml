name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Lint, typecheck, test (Bun)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bunx tsc
      - run: bun run test
      # Keeps the generated API reference building (broken links fail it).
      - run: bun run docs

  node:
    # The test suite runs on bun:test, so other runtimes are covered by
    # building the package and running a loopback round trip against the
    # published entry points (both ESM and CJS).
    name: Smoke test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: node scripts/smoke.mjs
      - run: node scripts/smoke.cjs

  deno:
    name: Smoke test (Deno)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: deno run scripts/smoke.mjs
